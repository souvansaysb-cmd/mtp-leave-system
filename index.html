<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTP - HR Leave Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B5E20; --primary-light: #2E7D32; --primary-lighter: #4CAF50;
    --accent: #D4A017; --accent-light: #F5D76E;
    --bg: #F7F5F2; --card: #FFFFFF; --sidebar: #0A2E0C;
    --text: #1A1A1A; --muted: #7C8186; --border: #E5E1DC;
    --danger: #C62828; --danger-bg: #FFEBEE;
    --success: #2E7D32; --success-bg: #E8F5E9;
    --warning: #E65100; --warning-bg: #FFF3E0;
    --info: #0277BD; --info-bg: #E1F5FE;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
  .font-display { font-family:'Playfair Display',serif; }

  /* Login background */
  .login-bg {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #0A2E0C 0%, #1B5E20 40%, #2E7D32 70%, #1B5E20 100%);
    position:relative; overflow:hidden;
  }
  .login-bg::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 20% 50%, rgba(212,160,23,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 50%);
  }
  .login-bg::after {
    content:''; position:absolute; inset:0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .login-card {
    position:relative; z-index:1; background:rgba(255,255,255,0.97); border-radius:16px;
    padding:48px 40px; width:420px; max-width:92vw;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }

  /* App layout */
  .app-shell { display:flex; min-height:100vh; }
  .sidebar {
    width:260px; background:var(--sidebar); color:#fff; position:fixed; top:0; left:0;
    bottom:0; z-index:40; transition:transform .3s ease; display:flex; flex-direction:column;
  }
  .sidebar.collapsed { transform:translateX(-260px); }
  .main-wrap { margin-left:260px; flex:1; min-height:100vh; transition:margin-left .3s ease; }
  .main-wrap.expanded { margin-left:0; }
  .topbar {
    height:64px; background:var(--card); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; padding:0 24px;
    position:sticky; top:0; z-index:30;
  }
  .content { padding:24px; max-width:1400px; }

  /* Nav items */
  .nav-item {
    display:flex; align-items:center; gap:12px; padding:11px 20px; margin:2px 12px;
    border-radius:8px; cursor:pointer; transition:all .15s; font-size:14px; color:rgba(255,255,255,.7);
  }
  .nav-item:hover { background:rgba(255,255,255,.1); color:#fff; }
  .nav-item.active { background:rgba(212,160,23,.2); color:var(--accent-light); font-weight:600; }
  .nav-item i { width:20px; text-align:center; font-size:15px; }
  .nav-badge {
    margin-left:auto; background:var(--danger); color:#fff; font-size:11px;
    padding:1px 7px; border-radius:10px; font-weight:600;
  }

  /* Stat cards */
  .stat-card {
    background:var(--card); border-radius:12px; padding:20px 24px;
    border:1px solid var(--border); position:relative; overflow:hidden;
    transition:transform .15s, box-shadow .15s;
  }
  .stat-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.08); }
  .stat-card .stat-icon {
    width:44px; height:44px; border-radius:10px; display:flex;
    align-items:center; justify-content:center; font-size:18px;
  }
  .stat-card::after {
    content:''; position:absolute; top:0; right:0; width:80px; height:80px;
    border-radius:50%; opacity:.06; transform:translate(20px,-20px);
  }

  /* Table */
  .data-table { width:100%; border-collapse:collapse; font-size:14px; }
  .data-table thead th {
    background:#F0EDE8; padding:12px 16px; text-align:left; font-weight:600;
    font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
    border-bottom:2px solid var(--border);
  }
  .data-table tbody td { padding:12px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .data-table tbody tr:hover { background:#FAFAF8; }

  /* Status badges */
  .badge {
    display:inline-flex; align-items:center; gap:5px; padding:4px 12px;
    border-radius:20px; font-size:12px; font-weight:600;
  }
  .badge-pending { background:var(--warning-bg); color:var(--warning); }
  .badge-approved { background:var(--success-bg); color:var(--success); }
  .badge-rejected { background:var(--danger-bg); color:var(--danger); }
  .badge-cancelled { background:#F5F5F5; color:var(--muted); }

  /* Buttons */
  .btn {
    display:inline-flex; align-items:center; gap:8px; padding:10px 20px;
    border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
    border:none; transition:all .15s; font-family:inherit;
  }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-primary:hover { background:var(--primary-light); }
  .btn-accent { background:var(--accent); color:#fff; }
  .btn-accent:hover { background:#B8860B; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-danger:hover { background:#B71C1C; }
  .btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text); }
  .btn-outline:hover { border-color:var(--primary); color:var(--primary); }
  .btn-sm { padding:6px 14px; font-size:13px; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }

  /* Form */
  .form-group { margin-bottom:20px; }
  .form-label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.3px; }
  .form-input {
    width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px;
    font-size:14px; font-family:inherit; background:var(--card); transition:border-color .15s;
  }
  .form-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(27,94,32,.1); }
  select.form-input { cursor:pointer; }
  textarea.form-input { resize:vertical; min-height:80px; }

  /* Modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .modal-overlay.show { opacity:1; pointer-events:auto; }
  .modal-box {
    background:var(--card); border-radius:16px; padding:32px;
    width:560px; max-width:92vw; max-height:85vh; overflow-y:auto;
    transform:translateY(20px); transition:transform .2s;
  }
  .modal-overlay.show .modal-box { transform:translateY(0); }

  /* Toast */
  .toast-wrap { position:fixed; top:80px; right:24px; z-index:200; display:flex; flex-direction:column; gap:8px; }
  .toast {
    padding:14px 20px; border-radius:10px; font-size:14px; font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,.15); display:flex; align-items:center; gap:10px;
    animation:slideIn .3s ease; min-width:300px;
  }
  .toast-success { background:#1B5E20; color:#fff; }
  .toast-error { background:#C62828; color:#fff; }
  .toast-info { background:#0277BD; color:#fff; }

  @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn .4s ease; }

  /* Notification panel */
  .notif-panel {
    position:absolute; top:100%; right:0; width:380px; max-height:480px;
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    box-shadow:0 12px 40px rgba(0,0,0,.15); overflow:hidden; z-index:50;
    display:none;
  }
  .notif-panel.show { display:block; }
  .notif-item { padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
  .notif-item:hover { background:#FAFAF8; }
  .notif-item.unread { background:#F0FAF0; }
  .notif-item.unread::before {
    content:''; display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--primary-lighter); margin-right:8px;
  }

  /* Chart container */
  .chart-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .chart-card h3 { font-size:15px; font-weight:600; margin-bottom:16px; color:var(--text); }

  /* Calendar */
  .cal-day {
    aspect-ratio:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; border-radius:8px; font-size:14px; cursor:default;
    position:relative; transition:background .15s;
  }
  .cal-day.today { background:var(--primary); color:#fff; font-weight:700; border-radius:50%; }
  .cal-day.has-leave::after {
    content:''; width:6px; height:6px; border-radius:50%; background:var(--accent);
    position:absolute; bottom:4px;
  }
  .cal-day.weekend { color:var(--muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#CCC; border-radius:3px; }

  /* Responsive */
  @media(max-width:768px) {
    .sidebar { transform:translateX(-260px); }
    .sidebar.open { transform:translateX(0); }
    .main-wrap { margin-left:0 !important; }
    .content { padding:16px; }
    .stat-grid { grid-template-columns:1fr !important; }
    .chart-grid { grid-template-columns:1fr !important; }
    .modal-box { padding:24px; }
    .notif-panel { width:320px; right:-60px; }
  }

  /* Loading spinner */
  .spinner { width:20px; height:20px; border:2.5px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .6s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Print styles */
  @media print {
    .sidebar, .topbar, .btn, .no-print { display:none !important; }
    .main-wrap { margin-left:0 !important; }
    .content { padding:0; }
  }
</style>
</head>
<body>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="loginScreen" class="login-bg">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:64px;height:64px;background:var(--primary);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
        <i class="fas fa-tree" style="color:var(--accent);font-size:28px"></i>
      </div>
      <h1 class="font-display" style="font-size:24px;color:var(--primary);margin-bottom:4px">Mekong Timber</h1>
      <p style="color:var(--muted);font-size:14px">HR Leave Management System</p>
    </div>
    <form id="loginForm" onsubmit="return App.handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Employee ID</label>
        <input type="text" id="loginId" class="form-input" placeholder="e.g. MTP001" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPass" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <div id="loginError" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></div>
      <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--muted)">&copy; 2025 Mekong Timber Plantations Co.,Ltd</p>
  </div>
</div>

<!-- ==================== APP SHELL ==================== -->
<div id="appShell" class="app-shell" style="display:none">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div style="padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;background:rgba(212,160,23,.2);border-radius:10px;display:flex;align-items:center;justify-content:center">
          <i class="fas fa-tree" style="color:var(--accent);font-size:18px"></i>
        </div>
        <div>
          <div class="font-display" style="font-size:16px;font-weight:700;line-height:1.2">MTP</div>
          <div style="font-size:11px;opacity:.6">Leave System</div>
        </div>
      </div>
    </div>
    <nav id="sidebarNav" style="flex:1;overflow-y:auto;padding:12px 0"></nav>
    <div style="padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)">
      <div id="sidebarUser" style="display:flex;align-items:center;gap:10px;margin-bottom:12px"></div>
      <button onclick="App.logout()" class="nav-item" style="margin:0;width:100%;color:rgba(255,255,255,.5)">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div id="mainWrap" class="main-wrap">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button id="menuToggle" onclick="App.toggleSidebar()" class="btn-outline btn-sm" style="border:none;font-size:18px;cursor:pointer;background:none;color:var(--text)">
          <i class="fas fa-bars"></i>
        </button>
        <h2 id="pageTitle" style="font-size:18px;font-weight:700"></h2>
      </div>
      <div style="display:flex;align-items:center;gap:16px;position:relative">
        <button id="notifBtn" onclick="App.toggleNotifPanel()" style="background:none;border:none;cursor:pointer;position:relative;font-size:18px;color:var(--muted)">
          <i class="fas fa-bell"></i>
          <span id="notifBadge" style="display:none;position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;font-size:10px;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;font-weight:700"></span>
        </button>
        <div id="notifPanel" class="notif-panel"></div>
        <div id="topbarUser" style="display:flex;align-items:center;gap:8px;font-size:14px"></div>
      </div>
    </header>
    <main id="mainContent" class="content"></main>
  </div>
</div>

<!-- Modal -->
<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this)App.closeModal()">
  <div id="modalBox" class="modal-box"></div>
</div>

<!-- Toast -->
<div id="toastWrap" class="toast-wrap"></div>

<script>
/* ============================================================
   MEKONG TIMBER PLANTATIONS - HR LEAVE MANAGEMENT FRONTEND
   ============================================================ */

// *** IMPORTANT: Replace this URL with your deployed Apps Script Web App URL ***
const API_URL = 'https://script.google.com/macros/s/AKfycbyO6NqZGpL5EBCVJm6N1dxbYu-2q9fwYXdEJ-S85uV0mxJGeQV6Ch1Tn_LmwL53ZcChDA/exec';

const App = {
  user: null,
  balance: null,
  view: 'dashboard',
  leaveTypes: [],
  notifications: [],
  unreadCount: 0,
  charts: {},
  sidebarOpen: window.innerWidth > 768,

  // ==================== INIT ====================
  init() {
    const saved = localStorage.getItem('mtp_user');
    if (saved) {
      try {
        this.user = JSON.parse(saved);
        this.enterApp();
      } catch(e) { localStorage.removeItem('mtp_user'); }
    }
  },

  // ==================== API ====================
  async api(action, data = {}) {
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action, data })
      });
      const json = await res.json();
      if (!json.success && json.error) this.toast(json.error, 'error');
      return json;
    } catch (e) {
      this.toast('Connection error. Please check your network.', 'error');
      return { success: false, error: 'Network error' };
    }
  },

  // ==================== AUTH ====================
  async handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    errEl.style.display = 'none';

    const res = await this.api('login', {
      employeeId: document.getElementById('loginId').value.trim().toUpperCase(),
      password: document.getElementById('loginPass').value
    });

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';

    if (res.success) {
      this.user = res.user;
      this.balance = res.balance;
      localStorage.setItem('mtp_user', JSON.stringify(this.user));
      this.enterApp();
    } else {
      errEl.textContent = res.error || 'Login failed';
      errEl.style.display = 'block';
    }
    return false;
  },

  logout() {
    this.user = null;
    this.balance = null;
    localStorage.removeItem('mtp_user');
    document.getElementById('appShell').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginPass').value = '';
    Object.values(this.charts).forEach(c => c.destroy && c.destroy());
    this.charts = {};
  },

  // ==================== ENTER APP ====================
  async enterApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    this.renderSidebar();
    this.renderTopbarUser();

    // Load leave types and notifications
    const [typesRes, notifRes] = await Promise.all([
      this.api('getLeaveTypes'),
      this.api('getNotifications', { employeeId: this.user.EmployeeID })
    ]);
    if (typesRes.success) this.leaveTypes = typesRes.types;
    if (notifRes.success) {
      this.notifications = notifRes.notifications;
      this.unreadCount = notifRes.unreadCount;
      this.renderNotifBadge();
    }

    this.navigate('dashboard');
  },

  // ==================== SIDEBAR ====================
  renderSidebar() {
    const r = this.user.Role;
    const pendingBadge = this.unreadCount > 0 ? `<span class="nav-badge">${this.unreadCount}</span>` : '';
    let items = [
      { id:'dashboard', icon:'fa-th-large', label:'Dashboard' },
      { id:'apply', icon:'fa-pen-to-square', label:'Apply Leave' },
      { id:'myrequests', icon:'fa-clock-rotate-left', label:'My Requests' },
    ];
    if (r === 'manager' || r === 'admin') {
      items.push({ id:'approvals', icon:'fa-check-double', label:'Approvals', badge: pendingBadge });
    }
    if (r === 'admin') {
      items.push({ id:'allrequests', icon:'fa-list-check', label:'All Requests' });
      items.push({ id:'employees', icon:'fa-users', label:'Employees' });
      items.push({ id:'balances', icon:'fa-scale-balanced', label:'Leave Balance' });
      items.push({ id:'reports', icon:'fa-file-excel', label:'Reports' });
    }
    items.push({ id:'calendar', icon:'fa-calendar-days', label:'Leave Calendar' });
    items.push({ id:'profile', icon:'fa-user-gear', label:'My Profile' });

    document.getElementById('sidebarNav').innerHTML = items.map(it =>
      `<div class="nav-item ${this.view===it.id?'active':''}" onclick="App.navigate('${it.id}')">
        <i class="fas ${it.icon}"></i> ${it.label} ${it.badge||''}
      </div>`
    ).join('');

    document.getElementById('sidebarUser').innerHTML = `
      <div style="width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff">
        ${this.user.FirstName[0]}${this.user.LastName[0]}
      </div>
      <div>
        <div style="font-size:13px;font-weight:600;line-height:1.2">${this.user.FirstName} ${this.user.LastName}</div>
        <div style="font-size:11px;opacity:.5;text-transform:uppercase">${this.user.Role}</div>
      </div>`;
  },

  renderTopbarUser() {
    document.getElementById('topbarUser').innerHTML = `
      <div style="width:32px;height:32px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff">
        ${this.user.FirstName[0]}${this.user.LastName[0]}
      </div>
      <span style="font-weight:500">${this.user.FirstName}</span>`;
  },

  toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const mw = document.getElementById('mainWrap');
    if (window.innerWidth <= 768) {
      sb.classList.toggle('open');
    } else {
      sb.classList.toggle('collapsed');
      mw.classList.toggle('expanded');
    }
  },

  // ==================== NAVIGATION ====================
  async navigate(view) {
    this.view = view;
    Object.values(this.charts).forEach(c => c.destroy && c.destroy());
    this.charts = {};
    this.renderSidebar();

    // Close mobile sidebar
    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');

    const titles = {
      dashboard:'Dashboard', apply:'Apply for Leave', myrequests:'My Leave Requests',
      approvals:'Pending Approvals', allrequests:'All Leave Requests', employees:'Employee Management',
      balances:'Leave Balance Management', reports:'Reports', calendar:'Leave Calendar', profile:'My Profile'
    };
    document.getElementById('pageTitle').textContent = titles[view] || 'Dashboard';
    document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:60px"><span class="spinner" style="width:32px;height:32px;border-width:3px"></span></div>';

    switch(view) {
      case 'dashboard': await this.renderDashboard(); break;
      case 'apply': this.renderApplyForm(); break;
      case 'myrequests': await this.renderMyRequests(); break;
      case 'approvals': await this.renderApprovals(); break;
      case 'allrequests': await this.renderAllRequests(); break;
      case 'employees': await this.renderEmployees(); break;
      case 'balances': await this.renderBalances(); break;
      case 'reports': this.renderReports(); break;
      case 'calendar': await this.renderCalendar(); break;
      case 'profile': this.renderProfile(); break;
    }
  },

  // ==================== DASHBOARD ====================
  async renderDashboard() {
    const res = await this.api('getDashboard', { role: this.user.Role, employeeId: this.user.EmployeeID });
    if (!res.success) return;
    const s = res.stats;
    const r = this.user.Role;
    let html = '<div class="fade-in">';

    // Stat cards
    html += '<div class="stat-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">';
    if (r === 'admin') {
      html += this.statCard('fa-users', 'Total Employees', s.totalEmployees, 'var(--primary)', 'var(--primary)');
      html += this.statCard('fa-clock', 'Pending', s.pendingRequests, 'var(--warning)', 'var(--warning)');
      html += this.statCard('fa-check-circle', 'Approved', s.approvedRequests, 'var(--success)', 'var(--success)');
      html += this.statCard('fa-person-walking-luggage', 'On Leave Today', s.onLeaveToday, 'var(--accent)', 'var(--accent)');
    } else if (r === 'manager') {
      html += this.statCard('fa-clock', 'Pending Approvals', s.pendingRequests, 'var(--warning)', 'var(--warning)');
      html += this.statCard('fa-people-group', 'Team Size', s.myTeamSize, 'var(--info)', 'var(--info)');
      html += this.statCard('fa-paper-plane', 'My Requests', s.myTotal, 'var(--primary)', 'var(--primary)');
      html += this.statCard('fa-check-circle', 'My Approved', s.myApproved, 'var(--success)', 'var(--success)');
    } else {
      html += this.statCard('fa-paper-plane', 'Total Requests', s.myTotal, 'var(--primary)', 'var(--primary)');
      html += this.statCard('fa-clock', 'Pending', s.pendingRequests, 'var(--warning)', 'var(--warning)');
      html += this.statCard('fa-check-circle', 'Approved', s.approvedRequests, 'var(--success)', 'var(--success)');
      html += this.statCard('fa-times-circle', 'Rejected', s.rejectedRequests, 'var(--danger)', 'var(--danger)');
    }
    html += '</div>';

    // Charts (admin only)
    if (r === 'admin' && s.byDepartment) {
      html += '<div class="chart-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">';
      html += '<div class="chart-card"><h3><i class="fas fa-chart-pie" style="color:var(--primary);margin-right:8px"></i>Employees by Department</h3><canvas id="chartDept"></canvas></div>';
      html += '<div class="chart-card"><h3><i class="fas fa-chart-bar" style="color:var(--accent);margin-right:8px"></i>Leave Days by Type</h3><canvas id="chartType"></canvas></div>';
      html += '</div>';
    }

    // Balance overview (employee/manager)
    if (r !== 'admin' && this.balance) {
      html += '<div class="chart-card" style="margin-bottom:24px"><h3><i class="fas fa-wallet" style="color:var(--primary);margin-right:8px"></i>My Leave Balance</h3>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:12px">';
      const b = this.balance;
      const types = ['Annual','Sick','Personal','Maternity','Unpaid'];
      types.forEach(t => {
        const used = this.calcMyUsed(t + ' Leave');
        const total = b[t] || 0;
        const pct = total > 0 ? Math.min(100, Math.round(used / total * 100)) : 0;
        const color = pct > 80 ? 'var(--danger)' : pct > 50 ? 'var(--warning)' : 'var(--success)';
        html += `<div style="text-align:center;padding:12px;border:1px solid var(--border);border-radius:8px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${t}</div>
          <div style="font-size:22px;font-weight:700">${total - used}<span style="font-size:13px;color:var(--muted);font-weight:400">/${total}</span></div>
          <div style="margin-top:6px;height:4px;background:#EEE;border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${color};border-radius:2px;transition:width .3s"></div>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${used} used</div>
        </div>`;
      });
      html += '</div></div>';
    }

    // Recent requests table
    if (s.recentRequests && s.recentRequests.length) {
      html += '<div class="chart-card"><h3><i class="fas fa-clock" style="color:var(--accent);margin-right:8px"></i>Recent Requests</h3>';
      html += this.requestTable(s.recentRequests, r === 'admin' || r === 'manager');
      html += '</div>';
    }

    html += '</div>';
    document.getElementById('mainContent').innerHTML = html;

    // Draw charts after DOM
    if (r === 'admin' && s.byDepartment) {
      setTimeout(() => this.drawDashboardCharts(s), 100);
    }
  },

  statCard(icon, label, value, color, bgColor) {
    return `<div class="stat-card">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="stat-icon" style="background:${bgColor}15;color:${color}"><i class="fas ${icon}"></i></div>
        <div>
          <div style="font-size:13px;color:var(--muted)">${label}</div>
          <div style="font-size:28px;font-weight:700;line-height:1.1">${value}</div>
        </div>
      </div>
      <div style="position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;background:${bgColor};opacity:.06;transform:translate(20px,-20px)"></div>
    </div>`;
  },

  calcMyUsed(type) {
    // Approximate from balance sheet vs total
    if (!this.balance) return 0;
    const key = type.replace(' Leave', '');
    const total = this.balance[key] || 0;
    // We don't have used count client-side accurately, return 0 — the server tracks it
    return 0;
  },

  drawDashboardCharts(s) {
    const colors = ['#1B5E20','#2E7D32','#4CAF50','#D4A017','#8BC34A','#66BB6A'];
    const deptEl = document.getElementById('chartDept');
    const typeEl = document.getElementById('chartType');
    if (deptEl) {
      this.charts.dept = new Chart(deptEl, {
        type: 'doughnut',
        data: {
          labels: Object.keys(s.byDepartment),
          datasets: [{ data: Object.values(s.byDepartment), backgroundColor: colors, borderWidth: 0 }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } } }
      });
    }
    if (typeEl) {
      this.charts.type = new Chart(typeEl, {
        type: 'bar',
        data: {
          labels: Object.keys(s.byLeaveType),
          datasets: [{ data: Object.values(s.byLeaveType), backgroundColor: '#1B5E20', borderRadius: 6, barThickness: 32 }]
        },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } } }
      });
    }
  },

  // ==================== APPLY LEAVE ====================
  renderApplyForm() {
    const bal = this.balance || {};
    const typeOptions = this.leaveTypes.map(t =>
      `<option value="${t.TypeName}">${t.TypeName} (Max: ${t.MaxDays}d, ${t.Paid === 'Yes' ? 'Paid' : 'Unpaid'})</option>`
    ).join('');

    // Get today as min date
    const today = new Date().toISOString().split('T')[0];

    document.getElementById('mainContent').innerHTML = `<div class="fade-in" style="max-width:680px">
      <div class="chart-card">
        <h3 style="font-size:18px;font-weight:700;margin-bottom:24px"><i class="fas fa-pen-to-square" style="color:var(--primary);margin-right:8px"></i>Submit Leave Request</h3>
        <form onsubmit="return App.handleSubmitLeave(event)">
          <div class="form-group">
            <label class="form-label">Leave Type</label>
            <select id="leaveType" class="form-input" required onchange="App.updateDaysPreview()">
              <option value="">Select leave type...</option>
              ${typeOptions}
            </select>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="form-group">
              <label class="form-label">Start Date</label>
              <input type="date" id="leaveStart" class="form-input" required min="${today}" onchange="App.updateDaysPreview()">
            </div>
            <div class="form-group">
              <label class="form-label">End Date</label>
              <input type="date" id="leaveEnd" class="form-input" required min="${today}" onchange="App.updateDaysPreview()">
            </div>
          </div>
          <div id="daysPreview" style="padding:12px 16px;background:var(--info-bg);border-radius:8px;font-size:14px;margin-bottom:20px;display:none"></div>
          <div class="form-group">
            <label class="form-label">Reason</label>
            <textarea id="leaveReason" class="form-input" placeholder="Briefly describe the reason for your leave..." required></textarea>
          </div>
          <div style="display:flex;gap:12px;justify-content:flex-end">
            <button type="button" class="btn btn-outline" onclick="App.navigate('dashboard')">Cancel</button>
            <button type="submit" id="submitLeaveBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Submit Request</button>
          </div>
        </form>
      </div>
    </div>`;
  },

  async updateDaysPreview() {
    const start = document.getElementById('leaveStart').value;
    const end = document.getElementById('leaveEnd').value;
    const type = document.getElementById('leaveType').value;
    const preview = document.getElementById('daysPreview');
    if (!start || !end || !type) { preview.style.display = 'none'; return; }
    if (start > end) { preview.style.display = 'block'; preview.innerHTML = '<span style="color:var(--danger)"><i class="fas fa-exclamation-triangle"></i> End date must be after start date</span>'; return; }

    // Calculate locally (approximate — weekends only, no holiday check client-side)
    let count = 0, cur = new Date(start), e = new Date(end);
    while (cur <= e) { const d = cur.getDay(); if (d !== 0 && d !== 6) count++; cur.setDate(cur.getDate() + 1); }
    // Show balance info
    const key = type.replace(' Leave', '');
    const total = (this.balance && this.balance[key]) || '?';
    preview.style.display = 'block';
    preview.innerHTML = `<i class="fas fa-info-circle" style="color:var(--info)"></i> <strong>~${count} working day(s)</strong> (excluding weekends). Your ${type} balance: <strong>${total} days</strong>. Final count will be calculated by the server including holidays.`;
  },

  async handleSubmitLeave(e) {
    e.preventDefault();
    const btn = document.getElementById('submitLeaveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Submitting...';

    const res = await this.api('submitLeave', {
      employeeId: this.user.EmployeeID,
      leaveType: document.getElementById('leaveType').value,
      startDate: document.getElementById('leaveStart').value,
      endDate: document.getElementById('leaveEnd').value,
      reason: document.getElementById('leaveReason').value
    });

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Request';

    if (res.success) {
      this.toast('Leave request submitted! ID: ' + res.requestId, 'success');
      this.navigate('myrequests');
    }
    return false;
  },

  // ==================== REQUEST TABLE HELPER ====================
  requestTable(requests, showActions = false) {
    if (!requests.length) return '<p style="color:var(--muted);padding:20px;text-align:center">No requests found.</p>';
    let html = '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
    html += '<th>Request ID</th><th>Employee</th><th>Department</th><th>Type</th><th>Period</th><th>Days</th><th>Status</th>';
    if (showActions) html += '<th>Actions</th>';
    html += '</tr></thead><tbody>';
    requests.forEach(r => {
      html += `<tr>
        <td style="font-weight:600;font-size:13px">${r.RequestID}</td>
        <td>${r.EmployeeName}</td>
        <td>${r.Department}</td>
        <td>${r.LeaveType}</td>
        <td style="font-size:13px">${this.fmtDate(r.StartDate)}<br><span style="color:var(--muted)">to ${this.fmtDate(r.EndDate)}</span></td>
        <td style="text-align:center;font-weight:600">${r.Days}</td>
        <td>${this.statusBadge(r.Status)}</td>`;
      if (showActions) {
        html += '<td>';
        if (r.Status === 'Pending') {
          html += `<button class="btn btn-sm btn-primary" onclick="App.showApproveModal('${r.RequestID}','${r.EmployeeName}','${r.LeaveType}','${r.StartDate}','${r.EndDate}',${r.Days})"><i class="fas fa-check"></i></button> `;
          html += `<button class="btn btn-sm btn-danger" onclick="App.showRejectModal('${r.RequestID}','${r.EmployeeName}')"><i class="fas fa-times"></i></button>`;
        }
        html += '</td>';
      }
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
  },

  // ==================== MY REQUESTS ====================
  async renderMyRequests() {
    const res = await this.api('getMyRequests', { employeeId: this.user.EmployeeID });
    if (!res.success) return;
    let html = '<div class="fade-in"><div class="chart-card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:16px;font-weight:700">My Leave History</h3>';
    html += `<button class="btn btn-primary btn-sm" onclick="App.navigate('apply')"><i class="fas fa-plus"></i> New Request</button></div>`;
    html += this.requestTable(res.requests);
    html += '</div></div>';
    document.getElementById('mainContent').innerHTML = html;
  },

  // ==================== APPROVALS ====================
  async renderApprovals() {
    const res = await this.api('getPendingRequests');
    if (!res.success) return;
    let html = '<div class="fade-in"><div class="chart-card">';
    html += `<h3 style="font-size:16px;font-weight:700;margin-bottom:16px"><i class="fas fa-check-double" style="color:var(--warning);margin-right:8px"></i>Pending Approvals <span style="background:var(--warning);color:#fff;padding:2px 10px;border-radius:12px;font-size:13px;margin-left:8px">${res.requests.length}</span></h3>`;

      html += '<div style="text-align:center;padding:40px;color:var(--muted)"><i class="fas fa-check-circle" style="font-size:48px;color:var(--success);margin-bottom:12px;display:block"></i>All caught up! No pending requests.</div>';

  showApproveModal(rid, name, type, start, end, days) {
    this.showModal(`
      <h3 style="font-size:18px;font-weight:700;margin-bottom:4px">Approve Leave Request</h3>
      <p style="color:var(--muted);font-size:14px;margin-bottom:20px">${rid} — ${name}</p>
      <div style="background:var(--success-bg);padding:14px;border-radius:8px;margin-bottom:20px;font-size:14px">

      </div>

        <label class="form-label">Remarks (optional)</label>

      </div>

  showRejectModal(rid, name) {
    this.showModal(`
      <h3 style="font-size:18px;font-weight:700;margin-bottom:4px;color:var(--danger)">Reject Leave Request</h3>
      <p style="color:var(--muted);font-size:14px;margin-bottom:20px">${rid} — ${name}</p>
      <div class="form-group">
        <label class="form-label">Reason for Rejection *</label>

      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button class="btn btn-outline" onclick="App.closeModal()">Cancel</button>

      </div>
    `);
  },

  async doApprove(rid, action) {
    const remarksEl = document.getElementById(action === 'Approved' ? 'approveRemarks' : 'rejectRemarks');
    const remarks = remarksEl ? remarksEl.value : '';
    if (action === 'Rejected' && !remarks.trim()) { this.toast('Please provide a rejection reason', 'error'); return; }

    this.closeModal();
    const res = await this.api('approveLeave', {
      requestId: rid, approverId: this.user.EmployeeID, action, remarks
    });
    if (res.success) {
      this.toast(res.message, 'success');
      this.navigate('approvals');
      // Refresh unread count
      const notifRes = await this.api('getNotifications', { employeeId: this.user.EmployeeID });
      if (notifRes.success) { this.unreadCount = notifRes.unreadCount; this.renderNotifBadge(); this.renderSidebar(); }
    }
  },

  showEditEmployeeModal(id, fn, ln, dept, pos, role, email, phone, status) {
    this.showModal(`
      <h3 style="font-size:18px;font-weight:700;margin-bottom:20px">Edit Employee — ${id}</h3>
      <form onsubmit="return App.doUpdateEmployee(event,'${id}')">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">

          <div class="form-group"><label class="form-label">Last Name</label><input id="editLast" class="form-input" value="${ln}" required></div>
          <div class="form-group"><label class="form-label">Department</label><input id="editDept" class="form-input" value="${dept}" required></div>
          <div class="form-group"><label class="form-label">Position</label><input id="editPos" class="form-input" value="${pos}" required></div>
          <div class="form-group"><label class="form-label">Role</label>
            <select id="editRole" class="form-input">
              <option value="employee" ${role==='employee'?'selected':''}>Employee</option>
              <option value="manager" ${role==='manager'?'selected':''}>Manager</option>
              <option value="admin" ${role==='admin'?'selected':''}>Admin</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Status</label>
            <select id="editStatus" class="form-input">
              <option value="Active" ${status==='Active'?'selected':''}>Active</option>
              <option value="Inactive" ${status==='Inactive'?'selected':''}>Inactive</option>
            </select>
          </div>
          <div class="form-group" style="grid-column:span 2"><label class="form-label">Email</label><input id="editEmail" class="form-input" type="email" value="${email}" required></div>
          <div class="form-group" style="grid-column:span 2"><label class="form-label">Phone</label><input id="editPhone" class="form-input" value="${phone||''}"></div>
          <div class="form-group" style="grid-column:span 2"><label class="form-label">New Password (leave blank to keep current)</label><input id="editPass" class="form-input" type="text" placeholder="Enter new password only if changing"></div>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px">
          <button type="button" class="btn btn-outline" onclick="App.closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
        </div>
      </form>
    `);
  },

  async doUpdateEmployee(e, id) {
    e.preventDefault();
    const data = {
      employeeId: id,
      firstName: document.getElementById('editFirst').value.trim(),
      lastName: document.getElementById('editLast').value.trim(),
      department: document.getElementById('editDept').value.trim(),
      position: document.getElementById('editPos').value.trim(),
      role: document.getElementById('editRole').value,
      status: document.getElementById('editStatus').value,
      email: document.getElementById('editEmail').value.trim(),
      phone: document.getElementById('editPhone').value.trim()
    };
    const pass = document.getElementById('editPass').value;
    if (pass) data.password = pass;
    const res = await this.api('updateEmployee', data);
    if (res.success) { this.closeModal(); this.toast('Employee updated', 'success'); this.navigate('employees'); }
    return false;
  },

  doDeleteEmployee(id, name) {
    this.showModal(`
      <div style="text-align:center;padding:12px 0">
        <div style="width:60px;height:60px;background:var(--danger-bg);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
          <i class="fas fa-exclamation-triangle" style="font-size:24px;color:var(--danger)"></i>
        </div>
        <h3 style="font-size:18px;font-weight:700;margin-bottom:8px">Delete Employee</h3>
        <p style="color:var(--muted);margin-bottom:24px">Are you sure you want to delete <strong>${name}</strong> (${id})? This will also remove their leave balance.</p>
        <div style="display:flex;gap:12px;justify-content:center">
          <button class="btn btn-outline" onclick="App.closeModal()">Cancel</button>
          <button class="btn btn-danger" onclick="App.confirmDeleteEmployee('${id}')"><i class="fas fa-trash"></i> Delete</button>
        </div>
      </div>
    `);
  },

  async confirmDeleteEmployee(id) {
    const res = await this.api('deleteEmployee', { employeeId: id });
    if (res.success) { this.closeModal(); this.toast('Employee deleted', 'success'); this.navigate('employees'); }
  },

  // ==================== BALANCE MANAGEMENT (ADMIN) ====================
  async renderBalances() {
    const [empRes, typeRes] = await Promise.all([this.api('getEmployees'), this.api('getLeaveTypes')]);
    if (!empRes.success) return;
    const types = typeRes.success ? typeRes.types.filter(t => t.TypeName !== 'Unpaid Leave') : [];
    const typeKeys = types.map(t => t.TypeName.replace(' Leave', ''));

    let html = '<div class="fade-in"><div class="chart-card">';
    html += '<h3 style="font-size:16px;font-weight:700;margin-bottom:16px">Leave Balance Management</h3>';
    html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Employee</th>';
    typeKeys.forEach(k => html += `<th>${k}</th>`);
    html += '</tr></thead><tbody>';

    empRes.employees.forEach(e => {
      const bal = empRes.employees.length ? null : null; // We need balance data
      html += `<tr><td style="font-weight:600">${e.EmployeeID} — ${e.FirstName} ${e.LastName}</td>`;
      // For each type, get from the balance sheet data
      // Since we don't have per-employee balance in the employees response, use the stored balance
      typeKeys.forEach(k => {
        html += `<td><input type="number" class="form-input" style="width:80px;padding:6px 8px;text-align:center" id="bal_${e.EmployeeID}_${k}" value="${this.getBalValue(e.EmployeeID, k)}" min="0"></td>`;
      });
      html += `<td><button class="btn btn-sm btn-primary" onclick="App.saveBalance('${e.EmployeeID}')"><i class="fas fa-save"></i></button></td></tr>`;
    });
    html += '</tbody></table></div></div></div>';
    document.getElementById('mainContent').innerHTML = html;
  },

  getBalValue(empId, key) {
    // Check our cached balance data (only works for current user)
    if (this.user.EmployeeID === empId && this.balance) return this.balance[key] || 0;
    return 0; // Will need to be loaded — for simplicity, admin sees 0 for others until they load
  },

  async saveBalance(empId) {
    const types = ['Annual','Sick','Personal','Maternity','Unpaid'];
    for (const t of types) {
      const el = document.getElementById('bal_' + empId + '_' + t);
      if (el) {
        await this.api('updateBalance', { employeeId: empId, leaveType: t, days: parseInt(el.value) || 0 });
      }
    }
    this.toast('Balance updated for ' + empId, 'success');
  },

  // ==================== REPORTS (ADMIN) ====================
  renderReports() {
    document.getElementById('mainContent').innerHTML = `<div class="fade-in">
      <div class="chart-card" style="margin-bottom:20px">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:20px"><i class="fas fa-filter" style="color:var(--primary);margin-right:8px"></i>Report Filters</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">
          <div class="form-group" style="margin:0"><label class="form-label">Start Date</label><input type="date" id="rptStart" class="form-input"></div>
          <div class="form-group" style="margin:0"><label class="form-label">End Date</label><input type="date" id="rptEnd" class="form-input"></div>
          <div class="form-group" style="margin:0"><label class="form-label">Department</label>
            <select id="rptDept" class="form-input"><option value="">All Departments</option>
              <option>Management</option><option>Operations</option><option>Finance</option><option>Forestry</option><option>Logistics</option><option>Human Resources</option>
            </select>
          </div>
          <div class="form-group" style="margin:0"><label class="form-label">Status</label>
            <select id="rptStatus" class="form-input"><option value="">All Status</option>
              <option>Pending</option><option>Approved</option><option>Rejected</option><option>Cancelled</option>
            </select>
          </div>
          <div class="form-group" style="margin:0"><label class="form-label">Leave Type</label>
            <select id="rptType" class="form-input"><option value="">All Types</option>
              ${this.leaveTypes.map(t => '<option>' + t.TypeName + '</option>').join('')}
            </select>
          </div>
          <div class="form-group" style="margin:0;display:flex;align-items:flex-end">
            <button class="btn btn-primary" style="width:100%" onclick="App.runReport()"><i class="fas fa-search"></i> Generate</button>
          </div>
        </div>
      </div>
      <div id="reportResult"></div>
    </div>`;
  },

  async runReport() {
    document.getElementById('reportResult').innerHTML = '<div style="text-align:center;padding:40px"><span class="spinner" style="width:28px;height:28px;border-width:3px"></span></div>';
    const res = await this.api('getReport', {
      startDate: document.getElementById('rptStart').value || undefined,
      endDate: document.getElementById('rptEnd').value || undefined,
      department: document.getElementById('rptDept').value || undefined,
      status: document.getElementById('rptStatus').value || undefined,
      leaveType: document.getElementById('rptType').value || undefined
    });
    if (!res.success) return;

    const s = res.summary;
    let html = `<div class="chart-card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div style="display:flex;gap:20px;flex-wrap:wrap">
          <div><span style="color:var(--muted);font-size:13px">Total Requests</span><br><strong style="font-size:20px">${s.total}</strong></div>
          <div><span style="color:var(--muted);font-size:13px">Total Days</span><br><strong style="font-size:20px">${s.totalDays}</strong></div>
          <div><span style="color:var(--success);font-size:13px">Approved</span><br><strong style="font-size:20px;color:var(--success)">${s.approved}</strong></div>
          <div><span style="color:var(--warning);font-size:13px">Pending</span><br><strong style="font-size:20px;color:var(--warning)">${s.pending}</strong></div>
          <div><span style="color:var(--danger);font-size:13px">Rejected</span><br><strong style="font-size:20px;color:var(--danger)">${s.rejected}</strong></div>
        </div>
        <button class="btn btn-accent" onclick="App.exportExcel()"><i class="fas fa-file-excel"></i> Export to Excel</button>
      </div>
    </div>`;
    html += '<div class="chart-card">' + this.requestTable(res.report) + '</div>';
    document.getElementById('reportResult').innerHTML = html;
    this._lastReport = res.report;
  },

  exportExcel() {
    if (!this._lastReport || !this._lastReport.length) { this.toast('No data to export', 'error'); return; }
    const rows = this._lastReport.map(r => ({
      'Request ID': r.RequestID, 'Employee ID': r.EmployeeID, 'Employee Name': r.EmployeeName,
      'Department': r.Department, 'Leave Type': r.LeaveType,
      'Start Date': r.StartDate, 'End Date': r.EndDate, 'Days': r.Days,
      'Reason': r.Reason, 'Status': r.Status,
      'Approver': r.ApproverName || '', 'Submitted': r.SubmittedAt,
      'Processed': r.ProcessedAt || '', 'Remarks': r.Remarks || ''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    // Set column widths
    ws['!cols'] = Object.keys(rows[0]).map(() => ({ wch: 18 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Leave Report');
    XLSX.writeFile(wb, 'MTP_Leave_Report_' + new Date().toISOString().split('T')[0] + '.xlsx');
    this.toast('Excel file downloaded', 'success');
  },

  // ==================== CALENDAR ====================
  async renderCalendar() {
    const now = new Date();
    const year = now.getFullYear(), month = now.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = now.getDate();
    const monthName = now.toLocaleString('default', { month: 'long', year: 'numeric' });

    // Get approved requests for this month
    const res = await this.api('getAllRequests');
    const approved = res.success ? res.report || res.requests || [] : [];
    const monthStr = `${year}-${String(month + 1).padStart(2, '0')}`;
    const monthLeaves = approved.filter(r => r.Status === 'Approved' && r.StartDate && r.StartDate.startsWith(monthStr));

    // Build day->leaves map
    const dayLeaves = {};
    monthLeaves.forEach(r => {
      let start = new Date(r.StartDate), end = new Date(r.EndDate);
      while (start <= end) {
        if (start.getMonth() === month) {
          const d = start.getDate();
          if (!dayLeaves[d]) dayLeaves[d] = [];
          dayLeaves[d].push(r);
        }
        start.setDate(start.getDate() + 1);
      }
    });

    let html = `<div class="fade-in"><div class="chart-card">
      <h3 style="font-size:18px;font-weight:700;margin-bottom:20px"><i class="fas fa-calendar-days" style="color:var(--primary);margin-right:8px"></i>${monthName}</h3>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;margin-bottom:8px">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div style="font-size:12px;font-weight:600;color:var(--muted);padding:8px">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dayOfWeek = new Date(year, month, d).getDay();
      const isToday = d === today;
      const hasLeave = dayLeaves[d] && dayLeaves[d].length;
      const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
      let cls = 'cal-day';
      if (isToday) cls += ' today';
      if (hasLeave) cls += ' has-leave';
      if (isWeekend && !isToday) cls += ' weekend';
      const tooltip = hasLeave ? `title="${dayLeaves[d].map(l => l.EmployeeName).join(', ')}"` : '';
      html += `<div class="${cls}" ${tooltip} ${hasLeave ? `onclick="App.showDayLeaves(${d}, ${month}, ${year})" style="cursor:pointer"` : ''}>${d}</div>`;
    }
    html += '</div></div></div>';
    document.getElementById('mainContent').innerHTML = html;
  },

  showDayLeaves(day, month, year) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const dateDisplay = new Date(dateStr).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    // We need the full requests data — re-fetch
    this.api('getAllRequests').then(res => {
      if (!res.success) return;
      const leaves = res.requests.filter(r => r.Status === 'Approved' && r.StartDate <= dateStr && r.EndDate >= dateStr);
      let content = `<h3 style="font-size:18px;font-weight:700;margin-bottom:4px">Leaves on ${dateDisplay}</h3>`;
      if (!leaves.length) {
        content += '<p style="color:var(--muted);margin:16px 0">No one on leave this day.</p>';
      } else {
        content += '<div style="margin:16px 0">';
        leaves.forEach(l => {
          content += `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="width:36px;height:36px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px">${l.EmployeeName.split(' ').map(n=>n[0]).join('')}</div>
            <div><div style="font-weight:600">${l.EmployeeName}</div><div style="font-size:13px;color:var(--muted)">${l.LeaveType} — ${l.Days} day(s)</div></div>
          </div>`;
        });
        content += '</div>';
      }
      content += `<div style="text-align:right"><button class="btn btn-outline" onclick="App.closeModal()">Close</button></div>`;
      this.showModal(content);
    });
  },

  // ==================== PROFILE ====================
  renderProfile() {
    const u = this.user;
    document.getElementById('mainContent').innerHTML = `<div class="fade-in" style="max-width:600px">
      <div class="chart-card" style="margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
          <div style="width:72px;height:72px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff">${u.FirstName[0]}${u.LastName[0]}</div>
          <div>
            <h3 style="font-size:20px;font-weight:700">${u.FirstName} ${u.LastName}</h3>
            <p style="color:var(--muted)">${u.Position} — ${u.Department}</p>
            <p style="color:var(--muted);font-size:13px">${u.EmployeeID} | ${u.Email}</p>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:14px">
          <div style="padding:12px;background:#FAFAF8;border-radius:8px"><span style="color:var(--muted);font-size:12px">Phone</span><br><strong>${u.Phone || 'N/A'}</strong></div>
          <div style="padding:12px;background:#FAFAF8;border-radius:8px"><span style="color:var(--muted);font-size:12px">Join Date</span><br><strong>${this.fmtDate(u.JoinDate)}</strong></div>
          <div style="padding:12px;background:#FAFAF8;border-radius:8px"><span style="color:var(--muted);font-size:12px">Role</span><br><strong style="text-transform:capitalize">${u.Role}</strong></div>
          <div style="padding:12px;background:#FAFAF8;border-radius:8px"><span style="color:var(--muted);font-size:12px">Status</span><br><strong style="color:var(--success)">${u.Status}</strong></div>
        </div>
      </div>
      <div class="chart-card">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:20px"><i class="fas fa-lock" style="color:var(--primary);margin-right:8px"></i>Change Password</h3>
        <form onsubmit="return App.doChangePassword(event)">
          <div class="form-group"><label class="form-label">Current Password</label><input type="password" id="cpCurrent" class="form-input" required></div>
          <div class="form-group"><label class="form-label">New Password</label><input type="password" id="cpNew" class="form-input" required minlength="4"></div>
          <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" id="cpConfirm" class="form-input" required minlength="4"></div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Update Password</button>
        </form>
      </div>
    </div>`;
  },

  async doChangePassword(e) {
    e.preventDefault();
    const curr = document.getElementById('cpCurrent').value;
    const newP = document.getElementById('cpNew').value;
    const conf = document.getElementById('cpConfirm').value;
    if (newP !== conf) { this.toast('New passwords do not match', 'error'); return false; }
    const res = await this.api('changePassword', { employeeId: this.user.EmployeeID, currentPassword: curr, newPassword: newP });
    if (res.success) {
      this.toast('Password changed successfully', 'success');
      document.getElementById('cpCurrent').value = '';
      document.getElementById('cpNew').value = '';
      document.getElementById('cpConfirm').value = '';
    }
    return false;
  },

  // ==================== NOTIFICATIONS ====================
  renderNotifBadge() {
    const badge = document.getElementById('notifBadge');
    if (this.unreadCount > 0) {
      badge.style.display = 'flex';
      badge.textContent = this.unreadCount > 9 ? '9+' : this.unreadCount;
    } else {
      badge.style.display = 'none';
    }
  },

  toggleNotifPanel() {
    const panel = document.getElementById('notifPanel');
    if (panel.classList.contains('show')) {
      panel.classList.remove('show');
      return;
    }
    // Render notifications
    let html = `<div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <strong style="font-size:15px">Notifications</strong>
      ${this.unreadCount > 0 ? `<button onclick="App.markAllRead()" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:13px;font-weight:600">Mark all read</button>` : ''}
    </div>`;
    if (!this.notifications.length) {
      html += '<div style="padding:40px;text-align:center;color:var(--muted)"><i class="fas fa-bell-slash" style="font-size:32px;margin-bottom:8px;display:block"></i>No notifications</div>';
    } else {
      html += '<div style="max-height:380px;overflow-y:auto">';
      this.notifications.slice(0, 20).forEach(n => {
        html += `<div class="notif-item ${n.Read === 'No' ? 'unread' : ''}" onclick="App.markRead('${n.ID}')">
          <div style="font-size:13px;font-weight:600;margin-bottom:2px">${n.Title}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.4">${n.Message}</div>
          <div style="font-size:11px;color:#BBB;margin-top:4px">${n.CreatedAt}</div>
        </div>`;
      });
      html += '</div>';
    }
    panel.innerHTML = html;
    panel.classList.add('show');

    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', function handler(e) {
        if (!e.target.closest('#notifPanel') && !e.target.closest('#notifBtn')) {
          panel.classList.remove('show');
          document.removeEventListener('click', handler);
        }
      });
    }, 10);
  },

  async markRead(id) {
    await this.api('markNotifRead', { notificationId: id });
    const n = this.notifications.find(x => x.ID === id);
    if (n) n.Read = 'Yes';
    this.unreadCount = Math.max(0, this.unreadCount - 1);
    this.renderNotifBadge();
    this.renderSidebar();
    this.toggleNotifPanel();
  },

  async markAllRead() {
    for (const n of this.notifications.filter(x => x.Read === 'No')) {
      await this.api('markNotifRead', { notificationId: n.ID });
      n.Read = 'Yes';
    }
    this.unreadCount = 0;
    this.renderNotifBadge();
    this.renderSidebar();
    this.toggleNotifPanel();
  },

  // ==================== MODAL ====================
  showModal(html) {
    document.getElementById('modalBox').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('show');
  },

  closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  },

  // ==================== TOAST ====================
  toast(msg, type = 'info') {
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = 'toast toast-' + type;
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    el.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; el.style.transition = 'all .3s'; setTimeout(() => el.remove(), 300); }, 4000);
  },

  // ==================== UTILS ====================
  fmtDate(d) {
    if (!d) return '';
    try {
      const parts = d.split('T')[0].split('-');
      if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
      return d;
    } catch(e) { return d; }
  },

  statusBadge(status) {
    const map = {
      Pending: 'badge-pending',
      Approved: 'badge-approved',
      Rejected: 'badge-rejected',
      Cancelled: 'badge-cancelled'
    };
    const icons = { Pending: 'fa-clock', Approved: 'fa-check-circle', Rejected: 'fa-times-circle', Cancelled: 'fa-ban' };
    return `<span class="badge ${map[status] || ''}"><i class="fas ${icons[status] || 'fa-circle'}" style="font-size:10px"></i> ${status}</span>`;
  }
};

// Initialize on load
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
